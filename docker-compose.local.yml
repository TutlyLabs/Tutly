services:
  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=tutly_local
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - tutly_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console (http://localhost:9001)
    environment:
      - MINIO_ROOT_USER=tutlydev
      - MINIO_ROOT_PASSWORD=tutlydev123
    volumes:
      - minio_data:/data
    networks:
      - tutly_network
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Auto-creates the default bucket on startup
  minio-setup:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 tutlydev tutlydev123 &&
      mc mb --ignore-existing local/tutly-local &&
      mc anonymous set download local/tutly-local/AVATAR &&
      mc anonymous set download local/tutly-local/ATTACHMENT &&
      echo 'Bucket tutly-local ready'
      "
    networks:
      - tutly_network

volumes:
  postgres_data:
  minio_data:

networks:
  tutly_network:
    driver: bridge
