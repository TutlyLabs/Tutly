name: Deploy Runner Orchestrator to Production

# Builds orchestrator + jest sandbox images from the same tag so they stay in sync.

on:
  push:
    tags:
      - "runner-orchestrator@*"
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build and Deploy Runner Orchestrator
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Jest image metadata
        id: meta-jest
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/tutly-jest-runner
          tags: |
            type=sha,prefix=
            type=raw,value=latest
            type=match,pattern=runner-orchestrator@(.*),group=1

      - name: Build and push Jest sandbox image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/runner-orchestrator/Dockerfile.jest
          push: true
          tags: ${{ steps.meta-jest.outputs.tags }}
          labels: ${{ steps.meta-jest.outputs.labels }}
          cache-from: type=gha,scope=jest
          cache-to: type=gha,mode=max,scope=jest

      - name: Orchestrator image metadata
        id: meta-orch
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/tutly-runner-orchestrator
          tags: |
            type=sha,prefix=
            type=raw,value=latest
            type=match,pattern=runner-orchestrator@(.*),group=1

      - name: Build and push Orchestrator image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/runner-orchestrator/Dockerfile
          push: true
          tags: ${{ steps.meta-orch.outputs.tags }}
          labels: ${{ steps.meta-orch.outputs.labels }}
          cache-from: type=gha,scope=orch
          cache-to: type=gha,mode=max,scope=orch

      - name: Deploy to Coolify
        run: |
          RESPONSE=$(curl --request GET "${COOLIFY_WEBHOOK_RUNNER_ORCHESTRATOR}" \
            --header "Authorization: Bearer ${COOLIFY_TOKEN}" \
            --silent --show-error --fail)

          if [ $? -eq 0 ]; then
            echo "Deployment triggered successfully"
            echo "Response: $RESPONSE"
          else
            echo "Deployment failed"
            echo "Response: $RESPONSE"
            exit 1
          fi
        env:
          COOLIFY_WEBHOOK_RUNNER_ORCHESTRATOR: ${{ secrets.COOLIFY_WEBHOOK_RUNNER_ORCHESTRATOR }}
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
