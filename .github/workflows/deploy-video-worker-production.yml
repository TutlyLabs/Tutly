name: Deploy Video Worker to Production

on:
  push:
    tags:
      - "video-worker@*"
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build and Deploy Video Worker
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/tutly-video-worker
          tags: |
            type=sha,prefix=
            type=raw,value=latest
            type=match,pattern=video-worker@(.*),group=1

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/video-worker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Coolify
        run: |
          RESPONSE=$(curl --request GET "${COOLIFY_WEBHOOK_VIDEO_WORKER}" \
            --header "Authorization: Bearer ${COOLIFY_TOKEN}" \
            --silent --show-error --fail)

          if [ $? -eq 0 ]; then
            echo "Deployment triggered successfully"
            echo "Response: $RESPONSE"
          else
            echo "Deployment failed"
            echo "Response: $RESPONSE"
            exit 1
          fi
        env:
          COOLIFY_WEBHOOK_VIDEO_WORKER: ${{ secrets.COOLIFY_WEBHOOK_VIDEO_WORKER }}
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
