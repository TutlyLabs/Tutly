name: Release Android APK

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-android-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup
        uses: ./tooling/github/setup

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Decode google-services.json (optional)
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -z "$GOOGLE_SERVICES_JSON" ]; then
            echo "GOOGLE_SERVICES_JSON secret not set — Firebase will be unconfigured in this APK and push notifications will be dormant."
            exit 0
          fi
          echo "$GOOGLE_SERVICES_JSON" | base64 -d > apps/web/android/app/google-services.json
          echo "Wrote apps/web/android/app/google-services.json ($(wc -c < apps/web/android/app/google-services.json) bytes)"

      - name: Create Release PR or build APK
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm version-packages
          publish: pnpm -F web release:android
          commit: "chore: version packages"
          title: "chore: version packages"
          createGithubReleases: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Create GitHub Release with APK
        if: steps.changesets.outputs.hasChangesets == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -p "require('./apps/web/package.json').version")
          TAG="tutly-mobile-v${VERSION}"
          APK="apps/web/tutly-${VERSION}.apk"
          if [ ! -f "$APK" ]; then
            echo "No APK at $APK — publish step did not produce one. Skipping release."
            exit 0
          fi
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists. Uploading APK as a new asset (clobber)."
            gh release upload "$TAG" "$APK" --clobber
            exit 0
          fi
          NOTES="$(awk '/^## /{n++} n==1{print} n>1{exit}' apps/web/CHANGELOG.md 2>/dev/null || echo "Tutly Android v${VERSION}")"
          gh release create "$TAG" "$APK" \
            --title "Tutly Android v${VERSION}" \
            --notes "$NOTES"
